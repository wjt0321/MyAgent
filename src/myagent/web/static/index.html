<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgent Web UI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>MyAgent</h1>
                <button id="new-session-btn" class="btn-primary">+ 新会话</button>
            </div>
            <div class="session-list" id="session-list"></div>
            <div class="sidebar-footer">
                <span id="status-indicator" class="status-disconnected">未连接</span>
            </div>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <span id="current-agent">Agent: general</span>
                <span id="current-model">Model: glm-4.7</span>
            </div>

            <div class="messages" id="messages"></div>

            <div class="composer">
                <textarea
                    id="message-input"
                    placeholder="输入消息... (Shift+Enter 换行, Enter 发送)"
                    rows="3"
                ></textarea>
                <button id="send-btn" class="btn-primary">发送</button>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
