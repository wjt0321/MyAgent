<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgent Web UI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="theme-dark">
    <div class="app">
        <!-- Mobile Sidebar Toggle -->
        <button class="mobile-sidebar-toggle" id="mobile-sidebar-toggle">☰</button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>MyAgent</h1>
                <button id="new-session-btn" class="btn-primary">+ 新会话</button>
            </div>
            <div class="sidebar-section">
                <h3>会话</h3>
                <div class="session-list" id="session-list"></div>
            </div>
            <div class="sidebar-section">
                <h3>文件浏览器</h3>
                <div class="file-browser" id="file-browser">
                    <div class="file-tree" id="file-tree"></div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="footer-row">
                    <span id="status-indicator" class="status-disconnected">未连接</span>
                    <button class="btn-icon" id="theme-toggle" title="切换主题">🌙</button>
                </div>
            </div>
        </aside>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="chat-area">
            <div class="chat-header">
                <div class="header-left">
                    <span id="current-agent">Agent: general</span>
                    <span id="current-model">Model: glm-4.7</span>
                </div>
                <div class="header-right">
                    <select id="agent-select" class="agent-select">
                        <option value="general">general</option>
                        <option value="explore">explore</option>
                        <option value="worker">worker</option>
                        <option value="reviewer">reviewer</option>
                    </select>
                    <button class="btn-icon" id="search-toggle" title="搜索消息">🔍</button>
                </div>
            </div>

            <div class="search-bar" id="search-bar" style="display: none;">
                <input type="text" id="search-input" placeholder="搜索消息...">
                <button class="btn-icon" id="search-close">✕</button>
            </div>

            <div class="messages" id="messages"></div>

            <div class="composer">
                <textarea
                    id="message-input"
                    placeholder="输入消息... (Shift+Enter 换行, Enter 发送)"
                    rows="3"
                ></textarea>
                <button id="send-btn" class="btn-primary">
                    <span class="send-text">发送</span>
                    <span class="send-loading" style="display: none;">⏳</span>
                </button>
            </div>
        </main>

        <aside class="file-preview-panel" id="file-preview-panel" style="display: none;">
            <div class="preview-header">
                <span id="preview-filename"></span>
                <button id="close-preview" class="btn-icon">&times;</button>
            </div>
            <pre><code id="preview-content"></code></pre>
        </aside>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
