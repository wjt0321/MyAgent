<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgent</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="theme-dark">
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.9"/>
                            <rect x="16" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.6"/>
                            <rect x="2" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.6"/>
                            <rect x="16" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.3"/>
                        </svg>
                    </div>
                    <span class="brand-text">MyAgent</span>
                </div>
                <button id="new-session-btn" class="btn-new-session">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    新会话
                </button>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-label">会话</div>
                    <div class="session-list" id="session-list"></div>
                </div>
                <div class="nav-section">
                    <div class="nav-label">文件</div>
                    <div class="file-tree" id="file-tree"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="status-dot" id="status-dot"></span>
                    <span class="status-text" id="status-indicator">未连接</span>
                </div>
                <div class="footer-actions">
                    <button class="icon-btn" id="settings-btn" title="设置">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="theme-toggle" title="切换主题">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Mobile overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Mobile toggle -->
        <button class="mobile-toggle" id="mobile-sidebar-toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <!-- Header -->
            <header class="chat-header">
                <div class="header-info">
                    <div class="agent-badge" id="current-agent">general</div>
                    <div class="model-badge" id="current-model">glm-4.7</div>
                </div>
                <div class="header-actions">
                    <div class="agent-selector">
                        <select id="agent-select">
                            <option value="general">general</option>
                            <option value="explore">explore</option>
                            <option value="worker">worker</option>
                            <option value="reviewer">reviewer</option>
                        </select>
                    </div>
                    <button class="icon-btn" id="search-toggle" title="搜索">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Search bar -->
            <div class="search-bar" id="search-bar">
                <div class="search-input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="搜索消息...">
                </div>
                <button class="icon-btn" id="search-close">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- Messages -->
            <div class="messages" id="messages">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-logo">
                        <svg width="64" height="64" viewBox="0 0 28 28" fill="none">
                            <rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.9"/>
                            <rect x="16" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.6"/>
                            <rect x="2" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.6"/>
                            <rect x="16" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.3"/>
                        </svg>
                    </div>
                    <h1>MyAgent</h1>
                    <p>选择或创建一个会话开始对话</p>
                </div>
            </div>

            <!-- Composer -->
            <div class="composer">
                <div class="composer-inner">
                    <textarea
                        id="message-input"
                        placeholder="输入消息... Shift+Enter 换行"
                        rows="1"
                    ></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- File Preview Panel -->
        <aside class="preview-panel" id="file-preview-panel">
            <div class="preview-header">
                <span class="preview-filename" id="preview-filename"></span>
                <button class="icon-btn" id="close-preview">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="preview-body">
                <pre><code id="preview-content"></code></pre>
            </div>
        </aside>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-dialog modal-lg">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="icon-btn" id="close-settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <div class="tab-list">
                        <button class="tab-btn active" data-tab="agent">Agent</button>
                        <button class="tab-btn" data-tab="reset">重置</button>
                        <button class="tab-btn" data-tab="appearance">外观</button>
                        <button class="tab-btn" data-tab="about">关于</button>
                    </div>
                    <div class="tab-content active" data-tab="agent">
                        <div class="form-group">
                            <label>当前 Agent</label>
                            <select id="settings-agent-select">
                                <option value="general">general</option>
                                <option value="explore">explore</option>
                                <option value="worker">worker</option>
                                <option value="reviewer">reviewer</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>系统提示词</label>
                            <textarea id="settings-system-prompt" rows="4" placeholder="输入系统提示词..."></textarea>
                        </div>
                    </div>
                    <div class="tab-content" data-tab="reset">
                        <div class="reset-options">
                            <div class="reset-card">
                                <div class="reset-card-title">重置当前对话</div>
                                <div class="reset-card-desc">清空当前会话的所有消息历史</div>
                                <button class="btn-outline btn-sm" id="reset-conversation-btn">重置</button>
                            </div>
                            <div class="reset-card">
                                <div class="reset-card-title">重置所有会话</div>
                                <div class="reset-card-desc">删除所有会话数据，不可恢复</div>
                                <button class="btn-outline btn-sm" id="reset-all-sessions-btn">重置</button>
                            </div>
                            <div class="reset-card">
                                <div class="reset-card-title">重置配置</div>
                                <div class="reset-card-desc">恢复默认配置（保留 API Key）</div>
                                <button class="btn-outline btn-sm" id="reset-config-btn">重置</button>
                            </div>
                        </div>
                    </div>
                    <div class="tab-content" data-tab="appearance">
                        <div class="form-group">
                            <label>主题</label>
                            <select id="settings-theme-select">
                                <option value="dark">深色</option>
                                <option value="light">浅色</option>
                                <option value="auto">跟随系统</option>
                            </select>
                        </div>
                    </div>
                    <div class="tab-content" data-tab="about">
                        <div class="about-info">
                            <div class="about-logo">
                                <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
                                    <rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.9"/>
                                    <rect x="16" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.6"/>
                                    <rect x="2" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.6"/>
                                    <rect x="16" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.3"/>
                                </svg>
                            </div>
                            <div class="about-name">MyAgent</div>
                            <div class="about-version">v0.10.0</div>
                            <div class="about-stats">
                                <div class="stat">
                                    <div class="stat-value" id="settings-session-count">0</div>
                                    <div class="stat-label">会话</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-value" id="settings-message-count">0</div>
                                    <div class="stat-label">消息</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="save-settings-btn">保存设置</button>
            </div>
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div class="modal-overlay" id="reset-modal">
        <div class="modal-dialog modal-sm">
            <div class="modal-header">
                <h2>确认重置</h2>
            </div>
            <div class="modal-body">
                <p class="confirm-text" id="reset-message">确定要执行此操作吗？此操作不可撤销。</p>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" id="reset-cancel">取消</button>
                <button class="btn-danger" id="reset-confirm">确认重置</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
