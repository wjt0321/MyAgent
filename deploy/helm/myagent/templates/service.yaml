apiVersion: v1
kind: Service
metadata:
  name: {{ include "myagent.fullname" . }}
  labels:
    {{- include "myagent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.myagent.monitoring.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "myagent.selectorLabels" . | nindent 4 }}
