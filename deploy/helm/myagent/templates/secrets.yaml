apiVersion: v1
kind: Secret
metadata:
  name: {{ include "myagent.fullname" . }}-apikeys
  labels:
    {{- include "myagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  anthropic: {{ .Values.myagent.apiKeys.anthropic | default "" | quote }}
  openai: {{ .Values.myagent.apiKeys.openai | default "" | quote }}
  deepseek: {{ .Values.myagent.apiKeys.deepseek | default "" | quote }}
  zhipu: {{ .Values.myagent.apiKeys.zhipu | default "" | quote }}
  moonshot: {{ .Values.myagent.apiKeys.moonshot | default "" | quote }}
  minimax: {{ .Values.myagent.apiKeys.minimax | default "" | quote }}
  xai: {{ .Values.myagent.apiKeys.xai | default "" | quote }}
  gemini: {{ .Values.myagent.apiKeys.gemini | default "" | quote }}
  dashscope: {{ .Values.myagent.apiKeys.dashscope | default "" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "myagent.fullname" . }}-jwt
  labels:
    {{- include "myagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ .Values.myagent.web.jwtSecret | default (randAlphaNum 32) | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "myagent.fullname" . }}-gateway
  labels:
    {{- include "myagent.labels" . | nindent 4 }}
type: Opaque
stringData:
  telegram-token: {{ .Values.myagent.gateway.telegram.token | default "" | quote }}
  discord-token: {{ .Values.myagent.gateway.discord.token | default "" | quote }}
  slack-token: {{ .Values.myagent.gateway.slack.token | default "" | quote }}
