apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "myagent.fullname" . }}
  labels:
    {{- include "myagent.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "myagent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "myagent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "myagent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.myagent.monitoring.metricsPort }}
              protocol: TCP
          env:
            - name: MYAGENT_PROVIDER
              value: {{ .Values.myagent.provider | quote }}
            - name: MYAGENT_MODEL
              value: {{ .Values.myagent.model | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: anthropic
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: openai
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: deepseek
                  optional: true
            - name: ZHIPU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: zhipu
                  optional: true
            - name: MOONSHOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: moonshot
                  optional: true
            - name: MINIMAX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: minimax
                  optional: true
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: xai
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: gemini
                  optional: true
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-apikeys
                  key: dashscope
                  optional: true
            - name: MYAGENT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-jwt
                  key: secret
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-gateway
                  key: telegram-token
                  optional: true
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-gateway
                  key: discord-token
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "myagent.fullname" . }}-gateway
                  key: slack-token
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "myagent.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
