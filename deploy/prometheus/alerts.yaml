groups:
  - name: myagent
    interval: 30s
    rules:
      # High error rate
      - alert: MyAgentHighErrorRate
        expr: rate(query_errors_total[5m]) / rate(query_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MyAgent high error rate"
          description: "Error rate is {{ $value | humanizePercentage }} for agent {{ $labels.agent }}"

      # High latency
      - alert: MyAgentHighLatency
        expr: histogram_quantile(0.95, rate(query_duration_seconds_bucket[5m])) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "MyAgent high latency"
          description: "95th percentile latency is {{ $value }}s"

      # LLM provider errors
      - alert: MyAgentLLMProviderErrors
        expr: rate(query_errors_total[5m]) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MyAgent LLM provider errors"
          description: "LLM error rate is {{ $value }}/sec"

      # Tool failure rate
      - alert: MyAgentToolFailures
        expr: rate(tool_failure_total[5m]) / (rate(tool_success_total[5m]) + rate(tool_failure_total[5m])) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MyAgent tool failures"
          description: "Tool failure rate is {{ $value | humanizePercentage }}"

      # Context compaction frequency
      - alert: MyAgentFrequentCompaction
        expr: rate(query_compactions_total[5m]) > 0.1
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "MyAgent frequent context compaction"
          description: "Context is being compacted frequently ({{ $value }}/sec)"

      # Gateway disconnection
      - alert: MyAgentGatewayDisconnected
        expr: gateway_active_sessions == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MyAgent gateway disconnected"
          description: "No active gateway sessions for platform {{ $labels.platform }}"

      # High token usage
      - alert: MyAgentHighTokenUsage
        expr: query_context_tokens > 80000
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "MyAgent high token usage"
          description: "Context token count is {{ $value }}"

      # Cost threshold
      - alert: MyAgentCostThreshold
        expr: cost_tracker_total_cost > 10
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "MyAgent cost threshold exceeded"
          description: "Total cost is ${{ $value }}"
