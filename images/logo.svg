<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
    <defs>
        <!-- Background Radial Glow -->
        <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#1e1b4b" stop-opacity="1" />
            <stop offset="60%" stop-color="#0f172a" stop-opacity="1" />
            <stop offset="100%" stop-color="#020617" stop-opacity="1" />
        </radialGradient>
        
        <!-- Brand Gradients -->
        <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="1" />
            <stop offset="50%" stop-color="#8b5cf6" stop-opacity="1" />
            <stop offset="100%" stop-color="#06b6d4" stop-opacity="1" />
        </linearGradient>

        <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
            <stop offset="30%" stop-color="#f8fafc" stop-opacity="1" />
            <stop offset="100%" stop-color="#a855f7" stop-opacity="1" />
        </linearGradient>

        <linearGradient id="wire-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0" />
            <stop offset="20%" stop-color="#8b5cf6" stop-opacity="0.5" />
            <stop offset="80%" stop-color="#06b6d4" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
        </linearGradient>

        <!-- Filters for Glow Effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03" />
            <circle cx="0" cy="0" r="1" fill="#ffffff" fill-opacity="0.05" />
            <!-- Plus signs at some intersections -->
            <path d="M -2 0 L 2 0 M 0 -2 L 0 2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.2" fill="none"/>
        </pattern>
        
        <!-- Network Node Object -->
        <g id="node">
            <circle cx="0" cy="0" r="4.5" fill="#a855f7" filter="url(#glow)"/>
            <circle cx="0" cy="0" r="2" fill="#ffffff" />
            <!-- Node pulse ring -->
            <circle cx="0" cy="0" r="10" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3" />
        </g>
    </defs>

    <!-- Base Background & Grid -->
    <!-- rx/ry rounds corners to make it look like a sleek widget rather than just a square banner -->
    <rect width="1000" height="320" fill="url(#bg-glow)" rx="24" ry="24" />
    <rect width="1000" height="320" fill="url(#grid)" rx="24" ry="24" />

    <!-- Ambient Spotlights behind nodes & center -->
    <circle cx="500" cy="120" r="180" fill="#8b5cf6" fill-opacity="0.15" filter="url(#glow-strong)" />
    <circle cx="200" cy="160" r="150" fill="#3b82f6" fill-opacity="0.12" filter="url(#glow-strong)" />
    <circle cx="800" cy="160" r="150" fill="#06b6d4" fill-opacity="0.1" filter="url(#glow-strong)" />

    <!-- Circuit/Network Wave Lines in Background -->
    <g stroke="url(#wire-grad)" stroke-width="1.5" stroke-opacity="0.6" fill="none">
        <!-- Left Side Neural Paths -->
        <path d="M 0 160 C 100 160, 150 70, 250 80 S 350 120, 420 120" />
        <path d="M 0 200 C 120 200, 160 260, 240 260 S 340 180, 420 160" />
        <path d="M 50 100 C 130 90, 180 180, 300 180 S 380 90, 430 90" />
        
        <!-- Right Side Neural Paths -->
        <path d="M 1000 160 C 900 160, 850 70, 750 80 S 650 120, 580 120" />
        <path d="M 1000 200 C 880 200, 840 260, 760 260 S 660 180, 580 160" />
        <path d="M 950 100 C 870 90, 820 180, 700 180 S 620 90, 570 90" />
    </g>

    <!-- Placement of Agent Nodes (Dots) -->
    <use href="#node" x="250" y="80" />
    <use href="#node" x="240" y="260" />
    <use href="#node" x="300" y="180" />
    <use href="#node" x="120" y="200" />
    <use href="#node" x="80" y="100" />
    
    <use href="#node" x="750" y="80" />
    <use href="#node" x="760" y="260" />
    <use href="#node" x="700" y="180" />
    <use href="#node" x="880" y="200" />
    <use href="#node" x="920" y="100" />

    <!-- CENTERPIECE LOGO ICON -->
    <g transform="translate(420, 40)">
        <!-- Outer Tech Ring -->
        <circle cx="80" cy="80" r="70" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="2 6 22 6" opacity="0.4" />
        <circle cx="80" cy="80" r="60" fill="none" stroke="url(#brand-grad)" stroke-width="4" stroke-dasharray="40 10 10 10 60 20" stroke-linecap="round" filter="url(#glow)"/>
        
        <!-- Abstract M & A Hybrid Emblem -->
        <!-- M-Shape Base -->
        <path d="M 40 105 L 55 45 L 80 80 L 105 45 L 120 105" fill="none" stroke="url(#brand-grad)" stroke-width="10" stroke-linejoin="miter" stroke-miterlimit="5" stroke-linecap="round" filter="url(#glow)" />
        
        <!-- A-Shape Crossbar integrating inside the M -->
        <path d="M 62 85 L 98 85" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />
        
        <!-- Floating core dot -->
        <circle cx="80" cy="80" r="6" fill="#06b6d4" filter="url(#glow)" />
        <circle cx="80" cy="80" r="2.5" fill="#ffffff" />
    </g>

    <!-- MASTER TYPOGRAPHY -->
    <!-- "MyAgent" Title -->
    <text x="500" y="250" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="900" font-style="italic" text-anchor="middle" fill="url(#text-grad)" letter-spacing="3" filter="drop-shadow(0px 4px 8px rgba(0,0,0,0.5))">
        MyAgent
    </text>

    <!-- Subtitle Data -->
    <text x="500" y="285" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="600" text-anchor="middle" fill="#94a3b8" letter-spacing="4">
        AUTONOMOUS AI AGENT PLATFORM
    </text>

    <!-- UI/Tech Frame Elements (Corners) -->
    <!-- Top Left -->
    <path d="M 40 70 L 40 40 L 70 40" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6" />
    <path d="M 45 45 L 55 45 M 45 50 L 45 60" stroke="#8b5cf6" stroke-width="2" opacity="0.4" fill="none" />
    
    <!-- Bottom Left -->
    <path d="M 40 250 L 40 280 L 70 280" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6" />
    <circle cx="45" cy="275" r="2" fill="#8b5cf6" />
    
    <!-- Top Right -->
    <path d="M 960 70 L 960 40 L 930 40" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6" />
    <path d="M 955 45 L 945 45 M 955 50 L 955 60" stroke="#8b5cf6" stroke-width="2" opacity="0.4" fill="none" />
    
    <!-- Bottom Right -->
    <path d="M 960 250 L 960 280 L 930 280" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6" />
    <circle cx="955" cy="275" r="2" fill="#8b5cf6" />
    
    <!-- Micro Details (System Status) -->
    <text x="50" y="270" font-family="'Courier New', Courier, monospace" font-size="11" fill="#8b5cf6" opacity="0.9" letter-spacing="1">SYS_ONLINE</text>
    <text x="50" y="255" font-family="'Courier New', Courier, monospace" font-size="10" fill="#3b82f6" opacity="0.6">ACT=ACTIVE</text>

    <text x="950" y="270" font-family="'Courier New', Courier, monospace" font-size="11" fill="#8b5cf6" opacity="0.9" text-anchor="end" letter-spacing="1">VER.0.11.0</text>
    <text x="950" y="255" font-family="'Courier New', Courier, monospace" font-size="10" fill="#3b82f6" opacity="0.6" text-anchor="end">KERNEL_RDY</text>
</svg>