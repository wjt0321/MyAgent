<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect x="10" y="10" width="380" height="100" rx="20" ry="20" fill="#0f172a" stroke="url(#grad1)" stroke-width="2"/>

  <!-- Icon: stylized M/A with circuit pattern -->
  <g transform="translate(30, 30)">
    <!-- Outer hexagon -->
    <polygon points="30,5 55,18 55,45 30,58 5,45 5,18" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
    <!-- Inner M shape -->
    <polyline points="15,45 15,25 22,32 30,25 38,32 45,25 45,45" fill="none" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Circuit dots -->
    <circle cx="30" cy="5" r="3" fill="#6366f1"/>
    <circle cx="55" cy="18" r="2" fill="#8b5cf6"/>
    <circle cx="55" cy="45" r="2" fill="#a855f7"/>
    <circle cx="30" cy="58" r="3" fill="#6366f1"/>
    <circle cx="5" cy="45" r="2" fill="#8b5cf6"/>
    <circle cx="5" cy="18" r="2" fill="#a855f7"/>
  </g>

  <!-- MyAgent text -->
  <text x="115" y="55" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="url(#grad1)">MyAgent</text>

  <!-- Subtitle -->
  <text x="115" y="80" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="1">AUTONOMOUS AI AGENT PLATFORM</text>

  <!-- Decorative line -->
  <line x1="115" y1="92" x2="350" y2="92" stroke="url(#grad1)" stroke-width="1" opacity="0.5"/>
</svg>